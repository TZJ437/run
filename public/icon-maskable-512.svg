<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- 背景铺满整个画布（maskable 安全区要求） -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="140" cy="140" r="200" fill="#f472b6" opacity="0.55"/>
  <circle cx="400" cy="400" r="220" fill="#0ea5e9" opacity="0.45"/>
  <!-- 主图形缩在 80% 安全区内 (即 51..461) -->
  <rect x="176" y="176" width="160" height="160" rx="40" fill="url(#glass)" stroke="white" stroke-width="3" stroke-opacity="0.6"/>
  <circle cx="256" cy="256" r="38" fill="white" opacity="0.9"/>
  <circle cx="256" cy="256" r="18" fill="url(#bg)"/>
</svg>
